      - pattern: "^AI Magazine - Issue \\d+, ([A-Za-z]+) (\\d{4})\\.pdf$"
        date_groups: [month_name, year]
      - pattern: "^AI Magazine ([A-Za-z]+) (\\d{4})\\.pdf$"
