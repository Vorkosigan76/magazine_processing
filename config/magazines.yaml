  - name: "Adobe Photoshop User"
    # Matches: ‌Adobe Photoshop User – Spring 2026.pdf
    pattern: "^.?Adobe Photoshop User [–-] ([A-Za-z]+) (\\d{4})\\.pdf$"
    date_groups: [season, year]
    template: "{name} {year}-{month}.pdf"

  - name: "AI Business Magazine"
    # Matches: AI Business Magazine - 2026-01.pdf / AI Business Magazine – 2025-08.pdf
    pattern: "^AI Business Magazine [–-] (\\d{4})-(\\d{2})\\.pdf$"
