    date_groups: [month_name, year]
    template: "{name} {year}{month} - {month_name_orig} {year}.pdf"

  - name: "60 Millions de Consommateurs Hors Serie"
    # Matches: 60 Millions de Consommateurs N231 • Jan Fev 2026.pdf
