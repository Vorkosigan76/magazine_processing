# Output template placeholders:
#   {name}       - magazine display name
#   {original}   - original filename (unchanged)
#   {date}       - full date as YYYY-MM-DD
#   {year}       - 4-digit year
#   {month}      - 2-digit month
#   {day}        - 2-digit day
#   {day_short}  - day without leading zero (e.g. 6)
#   {month_name} - full month name (e.g. March)
#   {month_name_orig} - original month name text as captured (e.g. "Mars")
#   {month_range} - original month range text (e.g. "Mars-Avril")
#
# date_groups values: day, month, year, month_name, month_range, season, year_short
#   - month_name: parses text month names in English, French, and German (e.g. "March", "Mars", "Oktober")
#   - month_range: parses first month from a range (e.g. "Mars-Avril"), full text available as {month_range}
#   - season: maps season names to months (printempsв†’4, Г©tГ©в†’7, automneв†’10, hiverв†’1; English equivalents too)
#   - year: defaults to current year if omitted
#   - day: defaults to 1 if omitted
#   - month: defaults to January if omitted (for year-only entries)
#   - if date_groups is empty, today's full date is used
#
# delete: true  вЂ” matched files are deleted instead of processed (no date_groups/template needed)
#
# Default template (if omitted): "{name} - {date}.pdf"

magazines:
  - name: "101 Places For Over 50s To Visit"
    # Matches: 101_Places_For_Over_50s_To_Visit_7th_Edition_December_2025.pdf
    pattern: "^101_Places_For_Over_50s_To_Visit.*\\.pdf$"
    delete: true

  - name: "4L Magazine"
    # Matches: 4L Magazine N93 вЂў Janvier-Fevrier 2026.Pdf
    pattern: "^4L Magazine N\\d+ [вЂўВ·] .+\\.[Pp]df$"
    delete: true

  - name: "60 Millions de Consommateurs"
    # Matches: 60 millions de consommateurs N620 вЂў Janvier 2026.Pdf
    pattern: "^60 [Mm]illions de [Cc]onsommateurs N\\d+ [вЂўВ·-] ([A-Za-zГЂ-Гї]+) (\\d{4})\\.pdf$"
    date_groups: [month_name, year]
    template: "{name} {year}{month} - {month_name_orig} {year}.pdf"

  - name: "60 Millions de Consommateurs Hors Serie"
    # Matches: 60 Millions de Consommateurs N231 вЂў Jan Fev 2026.pdf
    pattern: "^60 [Mm]illions de [Cc]onsommateurs N\\d+ [вЂўВ·-] ([A-Za-zГЂ-Гї]+ [A-Za-zГЂ-Гї]+) (\\d{4})\\.pdf$"
    date_groups: [month_range, year]
    template: "{name} {year}{month} - {month_range} {year}.pdf"

  - name: "AI Business Magazine"
